<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de gastos de viaje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0B1220;
      --surface:#121B2E;
      --surface-alt:#1A2540;
      --border:#243150;
      --teal:#2DD4BF;
      --purple:#A78BFA;
      --amber:#FBBF24;
      --text:#E8EDF7;
      --muted:#7C89A8;
      --danger:#F87171;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background:var(--bg);
      background-image: radial-gradient(circle at 20% 0%, rgba(167,139,250,0.08), transparent 40%), radial-gradient(circle at 80% 100%, rgba(45,212,191,0.07), transparent 40%);
      color:var(--text);
      font-family:'Inter', sans-serif;
      min-height:100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app{
      max-width:520px;
      margin:0 auto;
      padding:28px 18px 60px;
    }
    .hero{
      margin-bottom:22px;
    }
    .eyebrow{
      font-family:'JetBrains Mono', monospace;
      font-size:11px;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:var(--teal);
      margin:0 0 8px;
    }
    .profile-row{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .profile-row .profile-label{
      font-size:11px;
      color:var(--muted);
      letter-spacing:0.02em;
      text-transform:uppercase;
      margin:0;
    }
    .trip-title{
      font-family:'Space Grotesk', sans-serif;
      font-weight:700;
      font-size:28px;
      background:transparent;
      border:none;
      color:var(--text);
      width:100%;
      padding:0;
      outline:none;
      border-bottom:1px solid transparent;
      transition:border-color .15s;
    }
    .trip-title:focus{ border-bottom-color:var(--border); }
    .subtitle{
      color:var(--muted);
      font-size:13.5px;
      margin:6px 0 0;
    }
    .auth-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:20px;
      padding:22px;
      margin-bottom:20px;
    }
    .auth-options{
      display:flex;
      gap:10px;
      margin-bottom:18px;
    }
    .auth-options button{
      flex:1;
    }
    .main-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .main-header .current-user{
      font-size:15px;
      color:var(--text);
    }
    .summary-rail{
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding:6px 4px 16px;
      margin:0 -4px 6px;
      scrollbar-width:none;
    }
    .summary-rail::-webkit-scrollbar{display:none;}
    .stub{
      position:relative;
      flex:0 0 auto;
      min-width:148px;
      background:linear-gradient(155deg, var(--surface-alt), var(--surface));
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      padding:14px 16px 12px;
    }
    .summary-rail .stub:nth-child(odd){ transform:rotate(-1deg); }
    .summary-rail .stub:nth-child(even){ transform:rotate(1deg); }
    .stub .code{
      font-family:'JetBrains Mono', monospace;
      font-size:11px;
      letter-spacing:0.08em;
      color:var(--muted);
      text-transform:uppercase;
    }
    .stub .divider{
      border-top:2px dashed var(--border);
      margin:9px -16px;
    }
    .stub::before, .stub::after{
      content:'';
      position:absolute;
      width:16px;height:16px;
      background:var(--bg);
      border-radius:50%;
      top:42px;
    }
    .stub::before{ left:-8px; }
    .stub::after{ right:-8px; }
    .stub .amount{
      font-family:'JetBrains Mono', monospace;
      font-size:18px;
      font-weight:600;
      color:var(--text);
    }
    .stub .count{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }
    .stub-empty{
      color:var(--muted);
      font-size:13px;
      padding:18px 4px;
    }
    .actions{
      display:flex;
      gap:10px;
      margin-bottom:16px;
    }
    button{
      font-family:'Inter', sans-serif;
      cursor:pointer;
      border:none;
      border-radius:10px;
      font-weight:600;
      font-size:14px;
    }
    .btn-primary{
      flex:1;
      background:var(--teal);
      color:#06201C;
      padding:12px 16px;
      transition:filter .15s;
    }
    .btn-primary:hover{ filter:brightness(1.08); }
    .btn-secondary{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--border);
      padding:12px 14px;
    }
    .btn-secondary:hover{ color:var(--text); border-color:var(--muted); }
    .expense-form{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      margin-bottom:20px;
      display:grid;
      gap:12px;
    }
    .expense-form.hidden,
    #mainScreen.hidden,
    #authScreen.hidden{
      display:none !important;
    }
    .form-row{ display:flex; gap:10px; }
    .form-row > *{ flex:1; min-width:0; }
    label{
      display:block;
      font-size:11.5px;
      color:var(--muted);
      margin-bottom:5px;
      letter-spacing:0.02em;
    }
    input, select{
      width:100%;
      background:var(--surface-alt);
      border:1px solid var(--border);
      color:var(--text);
      border-radius:9px;
      padding:10px 11px;
      font-size:14.5px;
      font-family:'Inter', sans-serif;
      outline:none;
    }
    input:focus, select:focus{ border-color:var(--teal); }
    select{ appearance:none; }
    .form-actions{ display:flex; gap:10px; margin-top:4px; }
    .form-actions button{ flex:1; }
    .filters{
      display:flex;
      gap:10px;
      margin-bottom:14px;
    }
    .filters select{ font-size:13px; padding:8px 10px; }
    .list-meta{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      margin-bottom:10px;
    }
    .list-meta h2{
      font-family:'Space Grotesk', sans-serif;
      font-size:15px;
      margin:0;
      color:var(--text);
    }
    .list-meta span{
      font-size:12px;
      color:var(--muted);
    }
    .expense-list{ display:grid; gap:10px; }
    .expense-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:13px;
      padding:13px 14px;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .e-icon{
      width:38px; height:38px;
      border-radius:10px;
      background:var(--surface-alt);
      display:flex; align-items:center; justify-content:center;
      font-size:18px;
      flex:0 0 auto;
    }
    .e-main{ flex:1; min-width:0; }
    .e-desc{
      font-size:14.5px;
      font-weight:500;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .e-meta{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }
    .e-right{ text-align:right; flex:0 0 auto; }
    .e-amount{
      font-family:'JetBrains Mono', monospace;
      font-weight:600;
      font-size:15px;
      color:var(--amber);
    }
    .e-actions{
      display:flex;
      gap:6px;
      margin-top:5px;
      justify-content:flex-end;
    }
    .icon-btn{
      background:transparent;
      border:none;
      color:var(--muted);
      font-size:13px;
      padding:2px 4px;
      border-radius:6px;
    }
    .icon-btn:hover{ color:var(--text); background:var(--surface-alt); }
    .icon-btn.danger:hover{ color:var(--danger); }
    .empty-state{
      text-align:center;
      padding:40px 20px;
      color:var(--muted);
      border:1px dashed var(--border);
      border-radius:16px;
    }
    .empty-state .emoji{ font-size:30px; margin-bottom:8px; }
    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding:30px 0;
    }
    @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
  </style>
</head>
<body>
<div class="app">
  <div id="authScreen">
    <div class="hero">
      <p class="eyebrow">Bienvenido</p>
      <input class="trip-title" value="Acceso a gastos" readonly />
      <p class="subtitle">Crea tu cuenta o inicia sesión para usar la app.</p>
    </div>
    <div class="auth-card">
      <div class="auth-options">
        <button id="showLoginBtn" class="btn-primary">Iniciar sesión</button>
        <button id="showRegisterBtn" class="btn-secondary">Registrarse</button>
      </div>
      <form id="authForm" class="expense-form">
        <div>
          <label for="authUser">Usuario</label>
          <input id="authUser" type="text" placeholder="ej: ricardo" required />
        </div>
        <div>
          <label for="authPassword">Contraseña</label>
          <input id="authPassword" type="password" placeholder="********" required />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="authSubmitBtn">Iniciar sesión</button>
        </div>
      </form>
      <div id="authMessage" class="status"></div>
    </div>
  </div>

  <div id="mainScreen" class="hidden">
    <div class="hero">
      <p class="eyebrow">Cuaderno de viaje</p>
      <div class="main-header">
        <div>
          <p class="profile-label">Usuario</p>
          <div id="currentUser" class="current-user"></div>
        </div>
        <button id="logoutBtn" class="btn-secondary">Cerrar sesión</button>
      </div>
      <input id="tripTitle" class="trip-title" value="Mi viaje" />
      <p class="subtitle">Registro personal de gastos · varias monedas</p>
    </div>

    <div id="summaryRail" class="summary-rail"></div>

    <div class="actions">
      <button class="btn-primary" id="toggleFormBtn">+ Agregar gasto</button>
      <button class="btn-secondary" id="exportBtn">Exportar CSV</button>
    </div>

    <form id="expenseForm" class="expense-form hidden">
      <div>
        <label for="f-desc">Descripción</label>
        <input id="f-desc" type="text" placeholder="Ej: Taxi al hotel" required />
      </div>
      <div class="form-row">
        <div>
          <label for="f-amount">Monto</label>
          <input id="f-amount" type="number" step="0.01" min="0" placeholder="0" required />
        </div>
        <div>
          <label for="f-currency">Moneda</label>
          <select id="f-currency"></select>
        </div>
      </div>
      <div id="f-custom-currency-wrap" class="hidden">
        <label for="f-custom-currency">Código de moneda (3 letras)</label>
        <input id="f-custom-currency" type="text" maxlength="3" placeholder="Ej: JPY" style="text-transform:uppercase" />
      </div>
      <div class="form-row">
        <div>
          <label for="f-category">Categoría</label>
          <select id="f-category"></select>
        </div>
        <div>
          <label for="f-date">Fecha</label>
          <input id="f-date" type="date" required />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="cancelFormBtn">Cancelar</button>
        <button type="submit" class="btn-primary" id="submitFormBtn">Guardar gasto</button>
      </div>
    </form>

    <div class="filters">
      <select id="filterCategory"></select>
      <select id="filterCurrency"></select>
    </div>

    <div class="list-meta">
      <h2>Gastos</h2>
      <span id="listCount"></span>
    </div>

    <div id="loadingStatus" class="status">Cargando tu viaje…</div>
    <div id="expenseList" class="expense-list"></div>
    <div id="emptyState" class="empty-state hidden">
      <div class="emoji">🧳</div>
      <div>Aún no registras gastos.<br/>Agrega el primero arriba.</div>
    </div>
  </div>
</div>

<script>
(function(){
  const CATEGORIES = [
    { id:'comida', label:'Comida', emoji:'🍽️' },
    { id:'transporte', label:'Transporte', emoji:'🚕' },
    { id:'alojamiento', label:'Alojamiento', emoji:'🏨' },
    { id:'compras', label:'Compras', emoji:'🛍️' },
    { id:'actividades', label:'Actividades', emoji:'🎟️' },
    { id:'salud', label:'Salud', emoji:'💊' },
    { id:'otros', label:'Otros', emoji:'📦' },
  ];
  const CURRENCIES = ['CLP','USD','EUR','ARS','BRL','PEN','COP','MXN','GBP'];
  const ZERO_DECIMAL = ['CLP','COP','PYG'];
  const STORAGE_AUTH = 'gasto-diario-auth';
  const AUTH_MODES = { LOGIN: 'login', REGISTER: 'register' };
  const state = {
    username: '',
    profile: '',
    tripName: 'Mi viaje',
    expenses: [],
    editingId: null,
    filterCategory: 'all',
    filterCurrency: 'all',
    authMode: AUTH_MODES.LOGIN,
  };
  const API_BASE = '/api';
  const $ = (id) => document.getElementById(id);
  const storage = window.storage || {
    async get(key){
      const value = localStorage.getItem(key);
      return value === null ? {} : { value };
    },
    async set(key, value){
      localStorage.setItem(key, value);
    },
    async remove(key){
      localStorage.removeItem(key);
    }
  };

  function normalizeUser(value){
    return (value || '')
      .toString()
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, '_')
      .replace(/^_+|_+$/g, '');
  }

  function storageKey(base){
    return `${base}-${state.profile}`;
  }

  async function loadAuthSession(){
    try{
      const saved = await storage.get(STORAGE_AUTH);
      if(saved && saved.value){
        const parsed = JSON.parse(saved.value);
        state.username = parsed.username || '';
        state.profile = normalizeUser(state.username);
      }
    }catch(e){ /* ignore */ }
  }

  async function persistAuthSession(){
    try{
      await storage.set(STORAGE_AUTH, JSON.stringify({ username: state.username }));
    }catch(e){ console.error('No se pudo guardar la sesión', e); }
  }

  async function clearAuthSession(){
    try{
      await storage.remove(STORAGE_AUTH);
    }catch(e){ console.error('No se pudo borrar la sesión', e); }
  }

  async function loadLocalData(){
    try{
      const meta = await storage.get(storageKey('trip-meta'));
      if(meta && meta.value){
        const parsed = JSON.parse(meta.value);
        if(parsed.tripName) state.tripName = parsed.tripName;
      }
    }catch(e){ }
    try{
      const exp = await storage.get(storageKey('trip-expenses'));
      if(exp && exp.value){
        state.expenses = JSON.parse(exp.value);
      }
    }catch(e){ }
  }

  async function persistLocalData(){
    try{
      await storage.set(storageKey('trip-meta'), JSON.stringify({ tripName: state.tripName }));
      await storage.set(storageKey('trip-expenses'), JSON.stringify(state.expenses));
    }catch(e){ console.error('No se pudo guardar localmente', e); }
  }

  async function loadRemoteData(){
    if(!state.profile) return null;
    try{
      const resp = await fetch(`${API_BASE}/profile/${encodeURIComponent(state.profile)}`);
      if (!resp.ok) return null;
      return await resp.json();
    }catch(e){ return null; }
  }

  async function persistRemoteData(){
    if(!state.profile) return;
    try{
      await fetch(`${API_BASE}/profile/${encodeURIComponent(state.profile)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tripName: state.tripName, expenses: state.expenses })
      });
    }catch(e){ console.warn('No se pudo guardar en el servidor', e); }
  }

  async function persistAll(){
    await persistAuthSession();
    await persistLocalData();
    await persistRemoteData();
  }

  function authUrl(path){
    return `${API_BASE}/${path}`;
  }

  async function registerUser(username, password){
    const resp = await fetch(authUrl('register'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (!resp.ok) {
      const error = await resp.json().catch(() => ({ error: 'Error de registro' }));
      throw new Error(error.error || 'Error de registro');
    }
    return await resp.json();
  }

  async function loginUser(username, password){
    const resp = await fetch(authUrl('login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (!resp.ok) {
      const error = await resp.json().catch(() => ({ error: 'Error de acceso' }));
      throw new Error(error.error || 'Error de acceso');
    }
    return await resp.json();
  }

  function showElement(id){
    $(id).classList.remove('hidden');
  }

  function hideElement(id){
    $(id).classList.add('hidden');
  }

  function setAuthMessage(text){
    const element = $('authMessage');
    element.textContent = text || '';
  }

  function showAuthScreen(){
    hideElement('mainScreen');
    showElement('authScreen');
  }

  function showMainScreen(){
    hideElement('authScreen');
    showElement('mainScreen');
    $('currentUser').textContent = state.username || state.profile || 'Desconocido';
  }

  function showLoginMode(){
    state.authMode = AUTH_MODES.LOGIN;
    $('authSubmitBtn').textContent = 'Iniciar sesión';
    setAuthMessage('');
  }

  function showRegisterMode(){
    state.authMode = AUTH_MODES.REGISTER;
    $('authSubmitBtn').textContent = 'Registrarse';
    setAuthMessage('');
  }

  async function loadData(){
    if(!state.profile){
      showAuthScreen();
      return;
    }
    hideElement('loadingStatus');
    await loadLocalData();
    const remote = await loadRemoteData();
    if(remote){
      state.tripName = remote.tripName || state.tripName;
      state.expenses = Array.isArray(remote.expenses) ? remote.expenses : state.expenses;
    }
    $('tripTitle').value = state.tripName;
    renderAll();
    showMainScreen();
  }

  function catInfo(id){
    return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length-1];
  }

  function fmtAmount(amount, currency){
    const decimals = ZERO_DECIMAL.includes(currency) ? 0 : 2;
    return Number(amount).toLocaleString('es-CL', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  function todayStr(){
    return new Date().toISOString().slice(0,10);
  }

  function uid(){
    return (crypto && crypto.randomUUID) ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  }

  function buildSelects(){
    const catOptionsHtml = CATEGORIES.map(c => `<option value="${c.id}">${c.emoji} ${c.label}</option>`).join('');
    $('f-category').innerHTML = catOptionsHtml;
    const curOptionsHtml = CURRENCIES.map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="OTRA">Otra…</option>`;
    $('f-currency').innerHTML = curOptionsHtml;
    $('filterCategory').innerHTML = `<option value="all">Todas las categorías</option>` + catOptionsHtml;
    $('filterCurrency').innerHTML = `<option value="all">Todas las monedas</option>` + CURRENCIES.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function renderSummary(){
    const totals = {};
    const counts = {};
    state.expenses.forEach(e => {
      totals[e.currency] = (totals[e.currency] || 0) + Number(e.amount);
      counts[e.currency] = (counts[e.currency] || 0) + 1;
    });
    const currencies = Object.keys(totals);
    const rail = $('summaryRail');
    if(currencies.length === 0){
      rail.innerHTML = `<div class="stub-empty">Tus totales por moneda van a aparecer aquí.</div>`;
      return;
    }
    rail.innerHTML = currencies.map(cur => `
      <div class="stub">
        <div class="code">${cur}</div>
        <div class="divider"></div>
        <div class="amount">${fmtAmount(totals[cur], cur)}</div>
        <div class="count">${counts[cur]} gasto${counts[cur] === 1 ? '' : 's'}</div>
      </div>
    `).join('');
  }

  function filteredExpenses(){
    return state.expenses
      .filter(e => state.filterCategory === 'all' || e.category === state.filterCategory)
      .filter(e => state.filterCurrency === 'all' || e.currency === state.filterCurrency)
      .sort((a,b) => (b.date.localeCompare(a.date)) || (b.createdAt - a.createdAt));
  }

  function renderList(){
    const list = filteredExpenses();
    $('listCount').textContent = `${list.length} de ${state.expenses.length}`;
    const container = $('expenseList');
    const empty = $('emptyState');
    if(state.expenses.length === 0){
      container.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');
    if(list.length === 0){
      container.innerHTML = `<div class="status">No hay gastos con este filtro.</div>`;
      return;
    }
    container.innerHTML = list.map(e => {
      const cat = catInfo(e.category);
      const d = new Date(e.date + 'T00:00:00');
      const dateLabel = d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
      return `
        <div class="expense-card" data-id="${e.id}">
          <div class="e-icon">${cat.emoji}</div>
          <div class="e-main">
            <div class="e-desc">${escapeHtml(e.description)}</div>
            <div class="e-meta">${dateLabel} · ${cat.label}</div>
          </div>
          <div class="e-right">
            <div class="e-amount">${fmtAmount(e.amount, e.currency)} ${e.currency}</div>
            <div class="e-actions">
              <button class="icon-btn edit-btn" data-id="${e.id}" title="Editar">✎</button>
              <button class="icon-btn danger del-btn" data-id="${e.id}" title="Eliminar">🗑</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
    container.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => startEdit(btn.dataset.id));
    });
    container.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteExpense(btn.dataset.id));
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderAll(){
    renderSummary();
    renderList();
  }

  function showForm(){
    $('expenseForm').classList.remove('hidden');
    $('f-desc').focus();
  }
  function hideForm(){
    $('expenseForm').classList.add('hidden');
    $('expenseForm').reset();
    $('f-custom-currency-wrap').classList.add('hidden');
    state.editingId = null;
    $('submitFormBtn').textContent = 'Guardar gasto';
    $('f-date').value = todayStr();
  }

  function startEdit(id){
    const e = state.expenses.find(x => x.id === id);
    if(!e) return;
    state.editingId = id;
    $('f-desc').value = e.description;
    $('f-amount').value = e.amount;
    $('f-category').value = e.category;
    $('f-date').value = e.date;
    if(CURRENCIES.includes(e.currency)){
      $('f-currency').value = e.currency;
      $('f-custom-currency-wrap').classList.add('hidden');
    } else {
      $('f-currency').value = 'OTRA';
      $('f-custom-currency-wrap').classList.remove('hidden');
      $('f-custom-currency').value = e.currency;
    }
    $('submitFormBtn').textContent = 'Guardar cambios';
    showForm();
    $('expenseForm').scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function deleteExpense(id){
    const e = state.expenses.find(x => x.id === id);
    if(!e) return;
    if(!confirm(`¿Eliminar "${e.description}" (${fmtAmount(e.amount,e.currency)} ${e.currency})?`)) return;
    state.expenses = state.expenses.filter(x => x.id !== id);
    persistAll();
    renderAll();
  }

  function handleSubmit(ev){
    ev.preventDefault();
    const description = $('f-desc').value.trim();
    const amount = parseFloat($('f-amount').value);
    const category = $('f-category').value;
    const date = $('f-date').value;
    let currency = $('f-currency').value;
    if(currency === 'OTRA'){
      currency = ($('f-custom-currency').value || '').trim().toUpperCase();
    }
    if(!description || !amount || amount <= 0 || !currency || currency.length < 1){
      alert('Revisa la descripción, el monto y la moneda.');
      return;
    }
    if(state.editingId){
      const e = state.expenses.find(x => x.id === state.editingId);
      Object.assign(e, { description, amount, category, date, currency });
    } else {
      state.expenses.push({
        id: uid(),
        description,
        amount,
        category,
        date,
        currency,
        createdAt: Date.now(),
      });
    }
    persistAll();
    hideForm();
    renderAll();
  }

  function exportCSV(){
    if(state.expenses.length === 0){
      alert('No hay gastos para exportar todavía.');
      return;
    }
    const header = ['Fecha','Descripción','Categoría','Monto','Moneda'];
    const rows = state.expenses
      .slice()
      .sort((a,b) => a.date.localeCompare(b.date))
      .map(e => [e.date, e.description.replace(/"/g,'""'), catInfo(e.category).label, e.amount, e.currency]);
    const csv = [header, ...rows]
      .map(r => r.map(v => `"${v}"`).join(','))
      .join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(state.profile || 'viaje').replace(/\s+/g,'_')}_gastos.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  async function handleAuthSubmit(ev){
    ev.preventDefault();
    const rawUsername = ($('authUser').value || '').trim();
    const username = normalizeUser(rawUsername);
    const password = ($('authPassword').value || '').trim();
    if(!rawUsername || !username || !password){
      setAuthMessage('Usuario y contraseña son obligatorios.');
      return;
    }
    if(password.length < 3){
      setAuthMessage('La contraseña debe tener al menos 3 caracteres.');
      return;
    }
    try{
      if(state.authMode === AUTH_MODES.REGISTER){
        await registerUser(rawUsername, password);
        setAuthMessage('Registro exitoso. Ya puedes iniciar sesión.');
        $('authForm').reset();
        showLoginMode();
      } else {
        await loginUser(rawUsername, password);
        state.username = rawUsername;
        state.profile = username;
        await persistAuthSession();
        $('authForm').reset();
        await loadData();
        setAuthMessage('');
      }
    }catch(error){
      setAuthMessage(error.message);
    }
  }

  async function logout(){
    state.username = '';
    state.profile = '';
    state.expenses = [];
    state.tripName = 'Mi viaje';
    state.filterCategory = 'all';
    state.filterCurrency = 'all';
    await clearAuthSession();
    showAuthScreen();
  }

  function init(){
    buildSelects();
    $('f-date').value = todayStr();
    $('toggleFormBtn').addEventListener('click', () => {
      const isHidden = $('expenseForm').classList.contains('hidden');
      if(isHidden) showForm(); else hideForm();
    });
    $('cancelFormBtn').addEventListener('click', hideForm);
    $('expenseForm').addEventListener('submit', handleSubmit);
    $('exportBtn').addEventListener('click', exportCSV);
    $('f-currency').addEventListener('change', (e) => {
      $('f-custom-currency-wrap').classList.toggle('hidden', e.target.value !== 'OTRA');
    });
    $('filterCategory').addEventListener('change', (e) => {
      state.filterCategory = e.target.value;
      renderList();
    });
    $('filterCurrency').addEventListener('change', (e) => {
      state.filterCurrency = e.target.value;
      renderList();
    });
    $('showLoginBtn').addEventListener('click', showLoginMode);
    $('showRegisterBtn').addEventListener('click', showRegisterMode);
    $('authForm').addEventListener('submit', handleAuthSubmit);
    $('logoutBtn').addEventListener('click', logout);
    $('tripTitle').addEventListener('change', (e) => {
      state.tripName = e.target.value.trim() || 'Mi viaje';
      e.target.value = state.tripName;
      persistAll();
    });
    loadAuthSession().then(() => {
      if(state.profile){
        showMainScreen();
        loadData();
      } else {
        showAuthScreen();
      }
      showLoginMode();
    });
  }

  init();
})();
</script>
</body>
</html>
